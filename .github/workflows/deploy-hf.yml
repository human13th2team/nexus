name: Deploy FastAPI to Hugging Face

on:
  push:
    branches: [ "test/deploy" ]
    # [최적화 1] AI 백엔드 코드가 수정되었을 때만 이 액션이 실행되도록 제한합니다.
    paths:
      - 'backend-fastapi/**' 

jobs:
  deploy-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Sync Subdirectory to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. 허깅페이스 저장소를 'hf_space'라는 임시 폴더로 클론해옵니다.
          # 주의: 본인의 허깅페이스 유저명과 스페이스명으로 반드시 변경하세요!
          git clone https://[본인유저명]:$HF_TOKEN@huggingface.co/spaces/ashfortune/nexus-ai-api hf_space
          
          # 2. 클론해온 hf_space 안의 기존 파일들을 싹 비웁니다.
          rm -rf hf_space/*
          
          # 3. [핵심] 모노레포의 backend-fastapi 폴더 안의 모든 파일(숨김파일 포함)을 hf_space로 복사합니다.
          cp -a backend-fastapi/. hf_space/
          
          # 4. 허깅페이스로 다시 푸시합니다.
          cd hf_space
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto Deploy from Monorepo: ${{ github.event.head_commit.message }}" || echo "No changes to commit"
          git push
